<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Sản phẩm Mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f5f7fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .form-label {
            font-weight: 600;
        }
        .required:after {
            content: " *";
            color: red;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-shop"></i> Quản lý Sản phẩm
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/products">
                            <i class="bi bi-list-ul"></i> Danh sách
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/products/create">
                            <i class="bi bi-plus-circle"></i> Thêm mới
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">
                            <i class="bi bi-plus-circle"></i> Thêm Sản phẩm Mới
                        </h4>
                    </div>
                    <div class="card-body">
                        <form method="post" th:action="@{/products/create}" th:object="${product}" enctype="multipart/form-data" novalidate>
                            <!-- Hiển thị tất cả lỗi validation nếu có -->
                            <div class="alert alert-danger" role="alert" th:if="${#fields.hasErrors('*')}">
                                <strong>Vui lòng kiểm tra các trường bên dưới:</strong>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-12 mb-3">
                                    <label for="name" class="form-label">Name</label>
                                    <input type="text" class="form-control" id="name" 
                                           th:field="*{name}" 
                                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                                           placeholder="product Name">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" 
                                         th:errors="*{name}"></div>
                                </div>

                                <div class="col-md-12 mb-3">
                                    <label for="price" class="form-label">Price</label>
                                    <input type="number" class="form-control" id="price" step="1"
                                           th:field="*{price}"
                                           th:classappend="${#fields.hasErrors('price')} ? 'is-invalid' : ''"
                                           placeholder="9999999">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" 
                                         th:errors="*{price}"></div>
                                </div>

                                <div class="col-md-12 mb-3">
                                    <label for="imageFile" class="form-label">Image</label>
                                    <input type="file" class="form-control" id="imageFile" name="imageFile"
                                           th:classappend="${#fields.hasErrors('imageUrl')} ? 'is-invalid' : ''"
                                           accept="image/*">
                                    <small class="form-text text-muted">Chọn file | Không có tệp nào được chọn</small>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('imageUrl')}" 
                                         th:errors="*{imageUrl}"></div>
                                </div>

                                <div class="col-md-12 mb-3">
                                    <label for="categoryId" class="form-label">Category</label>
                                    <select class="form-select" id="categoryId"
                                            th:field="*{categoryId}"
                                            th:classappend="${#fields.hasErrors('categoryId')} ? 'is-invalid' : ''">
                                        <option value="">-- Chọn danh mục --</option>
                                        <option th:each="category : ${categories}" 
                                                th:value="${category.id}" 
                                                th:text="${category.name}"></option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('categoryId')}" 
                                         th:errors="*{categoryId}"></div>
                                </div>
                            </div>

                            <div class="d-flex justify-content-start mt-4">
                                <button type="submit" class="btn btn-success">
                                    Add Product
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

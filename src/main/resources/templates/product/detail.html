<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết Sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f5f7fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .product-image {
            max-width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 10px;
        }
        .info-label {
            font-weight: 600;
            color: #6c757d;
        }
        .info-value {
            font-size: 1.1rem;
            color: #212529;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-shop"></i> Quản lý Sản phẩm
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/products">
                            <i class="bi bi-list-ul"></i> Danh sách
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/products/create">
                            <i class="bi bi-plus-circle"></i> Thêm mới
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-10">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h4 class="mb-0">
                            <i class="bi bi-info-circle"></i> Chi tiết Sản phẩm
                        </h4>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-5 text-center">
                                <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}" 
                                     th:src="${product.imageUrl}" 
                                     th:alt="${product.name}"
                                     class="product-image mb-3">
                                <div th:unless="${product.imageUrl != null and !product.imageUrl.isEmpty()}" 
                                     class="product-image mb-3 d-flex align-items-center justify-content-center bg-light">
                                    <i class="bi bi-image" style="font-size: 5rem; color: #ccc;"></i>
                                </div>
                            </div>
                            <div class="col-md-7">
                                <h2 th:text="${product.name}" class="mb-4"></h2>
                                
                                <div class="mb-3">
                                    <span class="info-label">ID:</span>
                                    <span class="info-value" th:text="${product.id}"></span>
                                </div>

                                <div class="mb-3">
                                    <span class="info-label">Danh mục:</span>
                                    <span class="badge bg-info ms-2" th:text="${product.categoryName}"></span>
                                </div>

                                <div class="mb-3">
                                    <span class="info-label">Mô tả:</span>
                                    <p class="info-value mt-2" th:text="${product.description ?: 'Không có mô tả'}"></p>
                                </div>

                                <div class="mb-3">
                                    <span class="info-label">Giá:</span>
                                    <span class="info-value text-success fw-bold ms-2" 
                                          th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                                </div>

                                <div class="mb-3">
                                    <span class="info-label">Số lượng:</span>
                                    <span th:classappend="${product.quantity <= 10} ? 'badge bg-danger ms-2' : 'badge bg-success ms-2'" 
                                          th:text="${product.quantity}"></span>
                                    <span th:if="${product.quantity <= 10}" class="text-danger ms-2">
                                        <i class="bi bi-exclamation-triangle"></i> Sắp hết hàng
                                    </span>
                                </div>

                                <div class="mt-4">
                                    <a th:href="@{/products/edit/{id}(id=${product.id})}" 
                                       class="btn btn-warning me-2">
                                        <i class="bi bi-pencil"></i> Chỉnh sửa
                                    </a>
                                    <a th:href="@{/products/delete/{id}(id=${product.id})}" 
                                       class="btn btn-danger me-2"
                                       onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này?')">
                                        <i class="bi bi-trash"></i> Xóa
                                    </a>
                                    <a href="/products" class="btn btn-secondary">
                                        <i class="bi bi-arrow-left"></i> Quay lại
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

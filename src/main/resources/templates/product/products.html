<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách Sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f5f7fa;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .search-box {
            border-radius: 25px;
        }
        .btn-action {
            padding: 0.25rem 0.5rem;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-shop"></i> Quản lý Sản phẩm
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/products">
                            <i class="bi bi-list-ul"></i> Danh sách
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/products/create">
                            <i class="bi bi-plus-circle"></i> Thêm mới
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Alert Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i>
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle"></i>
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Header -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row align-items-center mb-3">
                    <div class="col-md-6">
                        <h2 class="mb-0">
                            Products
                        </h2>
                    </div>
                    <div class="col-md-6 text-end">
                        <a href="/products/create" class="btn btn-success">
                            Create New Product
                        </a>
                    </div>
                </div>
                <div class="row align-items-center">
                    <div class="col-md-12">
                        <form method="get" action="/products" class="d-flex">
                            <input type="text" name="keyword" th:value="${keyword}" 
                                   class="form-control search-box me-2" 
                                   placeholder="Search...">
                            <button type="submit" class="btn btn-secondary">
                                <i class="bi bi-search"></i> Search
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Products Table -->
        <div class="card">
            <div class="card-body">
                <div th:if="${products.empty}" class="text-center py-5">
                    <i class="bi bi-inbox" style="font-size: 4rem; color: #ccc;"></i>
                    <p class="text-muted mt-3">Không có sản phẩm nào</p>
                    <a href="/products/create" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> Thêm sản phẩm đầu tiên
                    </a>
                </div>

                <div th:unless="${products.empty}" class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Price</th>
                                <th>Image</th>
                                <th>Category Name</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="product, iterStat : ${products}">
                                <td th:text="${iterStat.count}"></td>
                                <td>
                                    <strong th:text="${product.name}"></strong>
                                </td>
                                <td>
                                    <strong class="text-success" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}"></strong>
                                </td>
                                <td>
                                    <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}" 
                                         th:src="${product.imageUrl}" 
                                         th:alt="${product.name}"
                                         style="width: 80px; height: 80px; object-fit: cover;" 
                                         class="img-thumbnail">
                                    <span th:unless="${product.imageUrl != null and !product.imageUrl.isEmpty()}" 
                                          class="text-muted">
                                        <i class="bi bi-image"></i> No image
                                    </span>
                                </td>
                                <td>
                                    <span class="badge bg-info" th:text="${product.categoryName}"></span>
                                </td>
                                <td class="text-center">
                                    <div class="btn-group" role="group">
                                        <a th:href="@{/products/edit/{id}(id=${product.id})}" 
                                           class="btn btn-sm btn-warning btn-action" title="Edit">
                                            Edit
                                        </a>
                                        <a th:href="@{/products/delete/{id}(id=${product.id})}" 
                                           class="btn btn-sm btn-danger btn-action" title="Delete"
                                           onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này?')">
                                            Delete
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div th:unless="${products.empty}" class="mt-3">
                    <p class="text-muted mb-0">
                        Tổng số: <strong th:text="${products.size()}"></strong> sản phẩm
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
